<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>洛聖都政府綜合終端系統 (v3.0 調度與資產擴充版)</title>
    <style>
        body { font-family: 'Courier New', Courier, monospace; background-color: #0a0a0a; color: #eee; margin: 0; }
        
        /* 導覽列 */
        .navbar { background-color: #222; padding: 15px; border-bottom: 2px solid #555; display: flex; gap: 10px; overflow-x: auto; }
        .nav-btn { background: #333; color: white; border: 1px solid #555; padding: 10px 15px; cursor: pointer; font-weight: bold; border-radius: 4px; white-space: nowrap; }
        .nav-btn:hover { background: #555; }
        .btn-citizen.active { background: #2b78e4; border-color: #2b78e4; }
        .btn-police.active { background: #0044cc; border-color: #4da6ff; color: #4da6ff; }
        .btn-ems.active { background: #cc0000; border-color: #ff4d4d; color: #ff4d4d; }
        .btn-dispatch.active { background: #800080; border-color: #d8b2d8; color: #d8b2d8; }

        .container { max-width: 900px; margin: 20px auto; padding: 20px; background-color: #111; border: 1px solid #333; }
        .page { display: none; }
        .page.active { display: block; }

        h2 { border-bottom: 1px solid currentColor; padding-bottom: 10px; margin-top: 0; }
        h3 { margin-top: 0; color: #ccc; }
        .police-theme { color: #4da6ff; }
        .ems-theme { color: #ff4d4d; }
        .dispatch-theme { color: #d8b2d8; }
        .citizen-theme { color: #2b78e4; }
        
        .section { margin-bottom: 20px; padding: 15px; border: 1px dashed #444; background: #000; }
        input, select, button, textarea { background: #222; color: white; border: 1px solid #555; padding: 8px; margin: 5px 0; width: 100%; box-sizing: border-box; font-family: inherit;}
        button { cursor: pointer; width: auto; font-weight: bold; }
        button:hover { background: #444; }
        
        /* 狀態列按鈕群 */
        .status-bar { display: flex; gap: 5px; margin-bottom: 15px; flex-wrap: wrap; }
        .status-btn { flex: 1; background: #222; border: 1px solid currentColor; padding: 10px; font-size: 0.9em; }
        .status-btn.active { background: currentColor; color: #000; }

        /* 案件看板 */
        .incident-board { background: #1a1a1a; border: 1px solid #555; height: 150px; overflow-y: auto; padding: 10px; margin-bottom: 15px; }
        .incident-card { border-left: 4px solid #ffaa00; background: #222; padding: 10px; margin-bottom: 10px; font-size: 0.9em; }
        .incident-card span.time { color: #888; float: right; }

        /* 隱藏區塊 */
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="navbar">
    <button class="nav-btn btn-citizen active" onclick="switchPage('citizen')">👤 市政大廳</button>
    <button class="nav-btn btn-police" onclick="switchPage('police')">🚓 LSPD 警用終端</button>
    <button class="nav-btn btn-ems" onclick="switchPage('ems')">🚑 LSFD 消防醫療</button>
    <button class="nav-btn btn-dispatch" onclick="switchPage('dispatch')">📡 911 調度中心</button>
</div>

<div class="container">

    <div id="page-citizen" class="page active citizen-theme">
        <h2>市政服務入口網 (Citizen Portal)</h2>
        
        <div class="section" id="citizen-reg-section">
            <h3>[步驟一] 新市民身分建檔</h3>
            <input type="text" id="regName" placeholder="姓名 (例：王大明)">
            <input type="date" id="regDob">
            <select id="regGender">
                <option value="男">男</option>
                <option value="女">女</option>
            </select>
            <button id="registerCitizenBtn">[ 提交身分建檔 ]</button>
            <p id="regMessage" style="color: #ffaa00;"></p>
        </div>

        <div class="section hidden" id="citizen-asset-section" style="border-color: #2b78e4;">
            <h3>[步驟二] 資產與執照登記</h3>
            <p>目前登入身分：<strong id="currentCitizenDisplay" style="color:#fff;"></strong></p>
            
            <label>登記類別：</label>
            <select id="assetType">
                <option value="vehicle">🚗 車輛登記 (輸入車牌號碼)</option>
                <option value="weapon">🔫 槍枝許可 (輸入槍枝序號)</option>
                <option value="license">📝 專業執照 (如：飛行駕照/律師執照)</option>
            </select>
            <input type="text" id="assetDetail" placeholder="輸入詳細資訊 (車牌/序號/執照名稱)">
            <button id="registerAssetBtn" style="border-color: #2b78e4;">[ 提交資產登記 ]</button>
            <p id="assetMessage" style="color: #ffaa00;"></p>
        </div>
    </div>

    <div id="page-police" class="page police-theme">
        <h2>LSPD 執法數據終端機 (MDT)</h2>
        
        <div class="status-bar police-theme">
            <button class="status-btn" onclick="setStatus(this, 'police')">10-8 (值勤中)</button>
            <button class="status-btn" onclick="setStatus(this, 'police')">10-7 (下班)</button>
            <button class="status-btn" onclick="setStatus(this, 'police')">10-23 (抵達現場)</button>
            <button class="status-btn" onclick="setStatus(this, 'police')">10-97 (前往案發地)</button>
            <button class="status-btn" onclick="setStatus(this, 'police')" style="color:#ff4d4d; border-color:#ff4d4d;">10-99 (緊急支援)</button>
        </div>

        <h3>/// 當前調度案件 (CAD) ///</h3>
        <div class="incident-board" id="police-incident-board">
            <div style="color:#888; text-align:center; margin-top:20px;">等待調度中心指派...</div>
        </div>

        <div class="section">
            <h3>/// NCIC 綜合檢索系統 ///</h3>
            <select id="policeSearchType" style="width: auto; display: inline-block;">
                <option value="citizen">👤 查市民 (身分證/姓名)</option>
                <option value="vehicle">🚗 查車牌</option>
                <option value="weapon">🔫 查槍枝序號</option>
            </select>
            <input type="text" id="policeSearchQuery" placeholder="輸入關鍵字..." style="width: 60%; display: inline-block;">
            <button id="policeSearchBtn">[ 執行檢索 ]</button>
            
            <div id="policeResultBox" class="section hidden" style="margin-top: 10px; border-color: currentColor;">
                <h4 style="margin: 0; text-decoration: underline;">檢索結果</h4>
                <div id="policeResultContent" style="margin-top: 10px; color: #fff;"></div>
            </div>
        </div>
    </div>

    <div id="page-ems" class="page ems-theme">
        <h2>LSFD 消防與醫療救援終端 (CAD)</h2>
        
        <div class="status-bar ems-theme">
            <button class="status-btn" onclick="setStatus(this, 'ems')">10-8 (值勤中)</button>
            <button class="status-btn" onclick="setStatus(this, 'ems')">10-7 (下班)</button>
            <button class="status-btn" onclick="setStatus(this, 'ems')">10-23 (抵達現場)</button>
            <button class="status-btn" onclick="setStatus(this, 'ems')">10-97 (前往救援)</button>
        </div>

        <h3>/// 當前救援任務 (CAD) ///</h3>
        <div class="incident-board" id="ems-incident-board">
            <div style="color:#888; text-align:center; margin-top:20px;">等待調度中心指派...</div>
        </div>
    </div>

    <div id="page-dispatch" class="page dispatch-theme">
        <h2>911 綜合調度中心 (Dispatch)</h2>
        <div class="section">
            <h3>/// 發布緊急通報 (BOLO / 911 Call) ///</h3>
            <label>案件代碼/標題：</label>
            <input type="text" id="incidentTitle" placeholder="例：10-10 鬥毆事件 / 11-99 警員受傷">
            <label>發生位置：</label>
            <input type="text" id="incidentLocation" placeholder="例：密申羅 佩羅高速公路">
            <label>狀況描述：</label>
            <textarea id="incidentDesc" rows="3" placeholder="描述嫌犯特徵或現場狀況..."></textarea>
            
            <label>需求單位：</label>
            <select id="incidentUnit">
                <option value="ALL">全體單位 (警 / 消)</option>
                <option value="LSPD">僅警察 (LSPD)</option>
                <option value="LSFD">僅消防醫療 (LSFD)</option>
            </select>
            
            <button id="dispatchBtn" style="border-color: #d8b2d8; color: #000; background: #d8b2d8;">[ 廣播發布任務 ]</button>
            <p id="dispatchMsg" style="color: #ffaa00;"></p>
        </div>
    </div>

</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getFirestore, collection, addDoc, query, where, getDocs, onSnapshot, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    // ⚠️ 替換成你的真實金鑰
    const firebaseConfig = {
        apiKey: "YOUR_API_KEY",
        authDomain: "YOUR_AUTH_DOMAIN",
        projectId: "YOUR_PROJECT_ID",
        storageBucket: "YOUR_STORAGE_BUCKET",
        messagingSenderId: "YOUR_MESSAGING_SENDER_ID",
        appId: "YOUR_APP_ID"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // 全域變數：記錄當前網頁註冊的市民ID
    let currentCitizenSession = null;

    // --- 頁面與狀態切換邏輯 ---
    window.switchPage = function(role) {
        document.querySelectorAll('.page').forEach(page => page.classList.remove('active'));
        document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
        document.getElementById('page-' + role).classList.add('active');
        document.querySelector('.btn-' + role).classList.add('active');
    };

    window.setStatus = function(btn, role) {
        document.querySelectorAll(`.status-bar.${role}-theme .status-btn`).forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
    };

    // ==========================================
    // 👤 市民功能：註冊與資產登記
    // ==========================================
    document.getElementById("registerCitizenBtn").addEventListener("click", async () => {
        const name = document.getElementById("regName").value;
        const dob = document.getElementById("regDob").value;
        const gender = document.getElementById("regGender").value;
        const msgBox = document.getElementById("regMessage");

        if (!name || !dob) return alert("資料不完整！");
        
        msgBox.innerText = "身分建檔中...";
        const citizenId = "CIT-" + Math.floor(1000 + Math.random() * 9000);

        try {
            await addDoc(collection(db, "citizens"), { citizenId, name, dob, gender, timestamp: serverTimestamp() });
            msgBox.innerText = `[建檔成功] 您的身分證號為：${citizenId}`;
            
            // 鎖定表單，解鎖資產登記區塊
            document.getElementById("regName").disabled = true;
            document.getElementById("regDob").disabled = true;
            document.getElementById("regGender").disabled = true;
            document.getElementById("registerCitizenBtn").style.display = "none";
            
            currentCitizenSession = { citizenId, name };
            document.getElementById("currentCitizenDisplay").innerText = `${name} (${citizenId})`;
            document.getElementById("citizen-asset-section").classList.remove("hidden");

        } catch (e) { console.error(e); msgBox.innerText = "寫入失敗，請檢查權限。"; }
    });

    document.getElementById("registerAssetBtn").addEventListener("click", async () => {
        if (!currentCitizenSession) return;
        const type = document.getElementById("assetType").value;
        const detail = document.getElementById("assetDetail").value;
        const msgBox = document.getElementById("assetMessage");

        if (!detail) return alert("請輸入詳細資訊！");

        msgBox.innerText = "資產登記中...";
        try {
            await addDoc(collection(db, "assets"), {
                citizenId: currentCitizenSession.citizenId,
                ownerName: currentCitizenSession.name,
                type: type,
                detail: detail.toUpperCase(),
                timestamp: serverTimestamp()
            });
            msgBox.innerText = `[登記成功] 資料已寫入州政府資料庫。`;
            document.getElementById("assetDetail").value = "";
        } catch (e) { console.error(e); msgBox.innerText = "寫入失敗。"; }
    });

    // ==========================================
    // 📡 調度員功能：發布即時任務
    // ==========================================
    document.getElementById("dispatchBtn").addEventListener("click", async () => {
        const title = document.getElementById("incidentTitle").value;
        const location = document.getElementById("incidentLocation").value;
        const desc = document.getElementById("incidentDesc").value;
        const unit = document.getElementById("incidentUnit").value;
        const msgBox = document.getElementById("dispatchMsg");

        if (!title || !location) return alert("請填寫案件標題與位置！");

        msgBox.innerText = "訊號發送中...";
        try {
            await addDoc(collection(db, "incidents"), {
                title, location, desc, unit,
                timestamp: serverTimestamp()
            });
            msgBox.innerText = "[發送成功] 已廣播至各單位 MDT。";
            document.getElementById("incidentTitle").value = "";
            document.getElementById("incidentLocation").value = "";
            document.getElementById("incidentDesc").value = "";
            setTimeout(() => msgBox.innerText = "", 3000);
        } catch (e) { console.error(e); msgBox.innerText = "發送失敗。"; }
    });

    // ==========================================
    // 🚓 🚑 警消共通功能：即時監聽調度任務
    // ==========================================
    // 使用 onSnapshot 即時監聽 incidents 集合的變化
    const incidentsQuery = query(collection(db, "incidents"), orderBy("timestamp", "desc"));
    onSnapshot(incidentsQuery, (snapshot) => {
        let policeHtml = "";
        let emsHtml = "";

        snapshot.forEach((doc) => {
            const data = doc.data();
            const timeStr = data.timestamp ? new Date(data.timestamp.toDate()).toLocaleTimeString() : "剛剛";
            const cardHtml = `
                <div class="incident-card">
                    <span class="time">[${timeStr}]</span>
                    <strong>${data.title}</strong><br>
                    <span style="color:#aaa;">📍 ${data.location}</span><br>
                    <span style="color:#ddd;">📝 ${data.desc}</span>
                </div>
            `;

            // 根據單位分發畫面
            if (data.unit === "ALL" || data.unit === "LSPD") policeHtml += cardHtml;
            if (data.unit === "ALL" || data.unit === "LSFD") emsHtml += cardHtml;
        });

        document.getElementById("police-incident-board").innerHTML = policeHtml || "<div style='color:#888; text-align:center; margin-top:20px;'>目前無勤務</div>";
        document.getElementById("ems-incident-board").innerHTML = emsHtml || "<div style='color:#888; text-align:center; margin-top:20px;'>目前無勤務</div>";
    });

    // ==========================================
    // 🚓 警察功能：綜合檢索 (查人/車/槍)
    // ==========================================
    document.getElementById("policeSearchBtn").addEventListener("click", async () => {
        const type = document.getElementById("policeSearchType").value;
        const queryVal = document.getElementById("policeSearchQuery").value.trim().toUpperCase();
        const resultBox = document.getElementById("policeResultBox");
        const contentBox = document.getElementById("policeResultContent");

        if (!queryVal) return;
        resultBox.classList.remove("hidden");
        contentBox.innerHTML = "<span style='color:#ffaa00;'>檢索中...</span>";

        try {
            if (type === "citizen") {
                // 查市民
                const cRef = collection(db, "citizens");
                const qId = query(cRef, where("citizenId", "==", queryVal));
                const qName = query(cRef, where("name", "==", queryVal));
                const [sId, sName] = await Promise.all([getDocs(qId), getDocs(qName)]);
                
                let found = sId.empty ? (sName.empty ? null : sName.docs[0].data()) : sId.docs[0].data();
                
                if (found) {
                    contentBox.innerHTML = `身分證：${found.citizenId}<br>姓名：${found.name}<br>生日：${found.dob}<br>性別：${found.gender}`;
                } else {
                    contentBox.innerHTML = "<span style='color:#ff4d4d;'>查無此市民紀錄。</span>";
                }
            } else {
                // 查資產 (車/槍)
                const aRef = collection(db, "assets");
                const q = query(aRef, where("type", "==", type), where("detail", "==", queryVal));
                const snap = await getDocs(q);

                if (!snap.empty) {
                    const found = snap.docs[0].data();
                    contentBox.innerHTML = `登記項目：${found.detail}<br>登記人：${found.ownerName} (${found.citizenId})<br>狀態：合法登記`;
                } else {
                    contentBox.innerHTML = "<span style='color:#ff4d4d;'>⚠️ 查無登記紀錄！可能為非法黑戶。</span>";
                }
            }
        } catch (e) {
            console.error(e);
            contentBox.innerHTML = "<span style='color:#ff4d4d;'>連線錯誤。</span>";
        }
    });

</script>
</body>
</html>
