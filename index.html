<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>洛聖都政府綜合終端系統 (v4.0 CAD 調度版)</title>
    <style>
        body { font-family: 'Courier New', Courier, monospace; background-color: #0a0a0a; color: #eee; margin: 0; }
        
        /* 導覽列 */
        .navbar { background-color: #222; padding: 10px 15px; border-bottom: 2px solid #555; display: flex; gap: 10px; overflow-x: auto; }
        .nav-btn { background: #333; color: white; border: 1px solid #555; padding: 8px 15px; cursor: pointer; font-weight: bold; border-radius: 4px; white-space: nowrap; }
        .nav-btn:hover { background: #555; }
        .btn-citizen.active { background: #2b78e4; border-color: #2b78e4; }
        .btn-police.active { background: #0044cc; border-color: #4da6ff; color: #4da6ff; }
        .btn-ems.active { background: #cc0000; border-color: #ff4d4d; color: #ff4d4d; }
        .btn-dispatch.active { background: #800080; border-color: #d8b2d8; color: #d8b2d8; }

        .container { max-width: 1200px; margin: 20px auto; padding: 20px; background-color: #111; border: 1px solid #333; min-height: 80vh; }
        .page { display: none; }
        .page.active { display: block; }

        h2, h3 { margin-top: 0; border-bottom: 1px solid currentColor; padding-bottom: 10px; }
        .police-theme { color: #4da6ff; }
        .dispatch-theme { color: #d8b2d8; }
        
        .section { margin-bottom: 15px; padding: 15px; border: 1px dashed #444; background: #000; }
        input, select, button, textarea { background: #222; color: white; border: 1px solid #555; padding: 8px; margin: 5px 0; width: 100%; box-sizing: border-box; font-family: inherit;}
        button { cursor: pointer; width: auto; font-weight: bold; }
        button:hover { background: #444; }
        
        /* 狀態列 */
        .status-bar { display: flex; gap: 5px; margin-bottom: 15px; flex-wrap: wrap; }
        .status-btn { flex: 1; background: #222; border: 1px solid currentColor; padding: 10px; font-size: 0.9em; text-align: center; }
        .status-btn.active { background: currentColor; color: #000; }

        /* 調度員網格排版 (Sonoran CAD 風格) */
        .dispatch-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 15px; }
        .panel { background: #1a1a1a; border: 1px solid #555; padding: 10px; height: 500px; overflow-y: auto; }
        
        /* 卡片設計 */
        .card { background: #222; border-left: 4px solid #555; padding: 10px; margin-bottom: 10px; font-size: 0.9em; }
        .card.active-inc { border-left-color: #ff4d4d; }
        .card.unit { border-left-color: #4da6ff; display: flex; justify-content: space-between; align-items: center; }
        .badge { background: #444; padding: 2px 6px; border-radius: 3px; font-size: 0.8em; margin-right: 5px;}
        .status-badge { font-weight: bold; padding: 2px 5px; }

        .hidden { display: none; }
    </style>
</head>
<body>

<div class="navbar">
    <button class="nav-btn btn-citizen active" onclick="switchPage('citizen')">👤 市政大廳</button>
    <button class="nav-btn btn-police" onclick="switchPage('police')">🚓 LSPD 警用終端</button>
    <button class="nav-btn btn-dispatch" onclick="switchPage('dispatch')">📡 911 調度中心</button>
</div>

<div class="container">

    <div id="page-citizen" class="page active">
        <h2 style="color: #2b78e4;">市政服務入口網</h2>
        <div class="section">
            <p>請參考上一版本的市民註冊邏輯，此版本著重展示調度與警用系統。</p>
        </div>
    </div>

    <div id="page-police" class="page police-theme">
        <h2>LSPD 執法數據終端機 (MDT)</h2>
        
        <div id="police-login-section" class="section">
            <h3>/// 值勤登入 (Go On-Duty) ///</h3>
            <div style="display: flex; gap: 10px;">
                <input type="text" id="unitName" placeholder="名稱/呼號 (例: Adam-1 / 王大明)">
                <select id="unitDept">
                    <option value="LSPD">LSPD (洛聖都警察局)</option>
                    <option value="BCSO">BCSO (布雷恩郡警局)</option>
                    <option value="SAHP">SAHP (高速公路巡警)</option>
                </select>
                <select id="unitRank">
                    <option value="Cadet">實習警員 (Cadet)</option>
                    <option value="Officer">警員 (Officer)</option>
                    <option value="Sergeant">警佐 (Sergeant)</option>
                    <option value="Captain">警長 (Captain)</option>
                </select>
            </div>
            <button id="goOnDutyBtn" style="border-color: #4da6ff; color: #4da6ff;">[ 登入系統並打卡上班 10-8 ]</button>
        </div>

        <div id="police-mdt-section" class="hidden">
            <div class="status-bar police-theme" id="police-status-bar">
                <button class="status-btn active" data-status="10-8 (巡邏中)">10-8 (巡邏中)</button>
                <button class="status-btn" data-status="10-7 (下班)">10-7 (下班)</button>
                <button class="status-btn" data-status="10-23 (抵達現場)">10-23 (抵達現場)</button>
                <button class="status-btn" data-status="10-97 (前往中)">10-97 (前往中)</button>
                <button class="status-btn" data-status="10-99 (緊急支援)" style="color:#ff4d4d; border-color:#ff4d4d;">10-99 (緊急支援)</button>
            </div>

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                <div class="section">
                    <h3>/// 分派給我的案件 ///</h3>
                    <div id="my-assigned-incidents" style="min-height: 200px;">
                        <span style="color:#888;">目前無指派任務...</span>
                    </div>
                </div>
                <div class="section">
                    <h3>/// NCIC 檢索 ///</h3>
                    <select id="policeSearchType"><option value="citizen">👤 查市民</option></select>
                    <input type="text" id="policeSearchQuery" placeholder="輸入關鍵字...">
                    <button id="policeSearchBtn">[ 執行檢索 ]</button>
                    <div id="policeResultContent" style="margin-top: 10px; color: #fff;"></div>
                </div>
            </div>
        </div>
    </div>

    <div id="page-dispatch" class="page dispatch-theme">
        <h2>911 綜合調度中心 (CAD System)</h2>
        
        <div class="dispatch-grid">
            <div class="panel">
                <h3>[1] 建立新案件</h3>
                <input type="text" id="incTitle" placeholder="標題 (例：10-10 鬥毆)">
                <input type="text" id="incLocation" placeholder="位置 (例：密申羅)">
                <textarea id="incDesc" rows="3" placeholder="詳細描述..."></textarea>
                <button id="createIncBtn" style="border-color: #d8b2d8; background: #d8b2d8; color: #000; width: 100%;">[ 發布至系統 ]</button>
            </div>

            <div class="panel">
                <h3>[2] 進行中案件 (Active Calls)</h3>
                <div id="dispatch-incidents-board">
                    </div>
            </div>

            <div class="panel">
                <h3>[3] 線上單位 (Active Units)</h3>
                <div id="dispatch-units-board">
                    </div>
            </div>
        </div>
    </div>

</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getFirestore, collection, addDoc, doc, updateDoc, setDoc, query, onSnapshot, orderBy, serverTimestamp, arrayUnion } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    // ⚠️ 替換成你的真實金鑰
    const firebaseConfig = {
         apiKey: "AIzaSyD4po8muOv3Wzm8NSJxph5UXdmR4zdZZa4",
 	 authDomain: "lspd-mdt-system.firebaseapp.com",
 	 projectId: "lspd-mdt-system",
  	 storageBucket: "lspd-mdt-system.firebasestorage.app",
  	 messagingSenderId: "468749906657",
 	 appId: "1:468749906657:web:5ad7ae50e50cec3792bda0",
 	 measurementId: "G-PH2LHCLY79"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // 全域變數
    let myUnitId = null; // 紀錄當前這台電腦登入的警員 ID
    let activeUnitsList = []; // 儲存目前線上的所有單位，用於指派選單

    // --- 頁面切換 ---
    window.switchPage = function(role) {
        document.querySelectorAll('.page').forEach(page => page.classList.remove('active'));
        document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
        document.getElementById('page-' + role).classList.add('active');
        document.querySelector('.btn-' + role).classList.add('active');
    };

    // ==========================================
    // 🚓 警察功能：值勤登入與狀態更新
    // ==========================================
    document.getElementById("goOnDutyBtn").addEventListener("click", async () => {
        const name = document.getElementById("unitName").value;
        const dept = document.getElementById("unitDept").value;
        const rank = document.getElementById("unitRank").value;

        if (!name) return alert("請輸入名稱或呼號！");

        // 在 Firestore 的 units 集合中建立一個新單位
        try {
            const docRef = await addDoc(collection(db, "units"), {
                name: name,
                dept: dept,
                rank: rank,
                status: "10-8 (巡邏中)",
                timestamp: serverTimestamp()
            });
            myUnitId = docRef.id; // 記下自己的 ID

            // 切換介面
            document.getElementById("police-login-section").classList.add("hidden");
            document.getElementById("police-mdt-section").classList.remove("hidden");
            alert(`登入成功！呼號：${name} (${dept})`);

        } catch (error) { console.error(error); alert("登入失敗，請檢查網路或資料庫權限。"); }
    });

    // 狀態按鈕點擊事件 (更新自己的狀態到資料庫)
    document.querySelectorAll(".status-btn").forEach(btn => {
        btn.addEventListener("click", async (e) => {
            if (!myUnitId) return;
            const newStatus = e.target.getAttribute("data-status");
            
            // UI 顏色切換
            document.querySelectorAll(".status-btn").forEach(b => b.classList.remove("active"));
            e.target.classList.add("active");

            // 更新 Firebase
            await updateDoc(doc(db, "units", myUnitId), { status: newStatus });
            
            // 如果是 10-7 (下班)，可以設計成登出 (為求簡單這裡僅改狀態)
            if(newStatus === "10-7 (下班)") alert("您已標記為下班狀態，調度員將不會指派新任務給您。");
        });
    });

    // ==========================================
    // 📡 調度功能：建立案件
    // ==========================================
    document.getElementById("createIncBtn").addEventListener("click", async () => {
        const title = document.getElementById("incTitle").value;
        const location = document.getElementById("incLocation").value;
        const desc = document.getElementById("incDesc").value;

        if (!title || !location) return alert("標題與位置必填！");

        try {
            await addDoc(collection(db, "incidents"), {
                title, location, desc, 
                assignedUnits: [], // 預設沒有指派任何單位
                status: "Active",
                timestamp: serverTimestamp()
            });
            document.getElementById("incTitle").value = "";
            document.getElementById("incLocation").value = "";
            document.getElementById("incDesc").value = "";
        } catch (error) { console.error(error); }
    });

    // 指派案件給單位的函數 (綁定到動態生成的按鈕上)
    window.assignUnitToIncident = async function(incidentId, selectId) {
        const unitId = document.getElementById(selectId).value;
        if (!unitId) return alert("請選擇一個單位！");

        // 將該單位的 ID 加進案件的 assignedUnits 陣列中
        try {
            await updateDoc(doc(db, "incidents", incidentId), {
                assignedUnits: arrayUnion(unitId)
            });
        } catch (error) { console.error(error); }
    };

    // ==========================================
    // 🔄 核心即時監聽系統 (Live CAD Updates)
    // ==========================================
    
    // 監聽 1：線上單位 (更新調度員畫面 & 建立選單)
    onSnapshot(collection(db, "units"), (snapshot) => {
        let boardHtml = "";
        activeUnitsList = []; // 清空重整

        snapshot.forEach((doc) => {
            const data = doc.data();
            const id = doc.id;
            activeUnitsList.push({ id, ...data });

            // 狀態顏色邏輯
            let statusColor = "#4da6ff";
            if(data.status.includes("10-7")) statusColor = "#555";
            if(data.status.includes("10-99")) statusColor = "#ff4d4d";

            boardHtml += `
                <div class="card unit">
                    <div>
                        <span class="badge">${data.dept}</span> 
                        <span class="badge">${data.rank}</span><br>
                        <strong>${data.name}</strong>
                    </div>
                    <div class="status-badge" style="color: ${statusColor}; border: 1px solid currentColor;">
                        ${data.status}
                    </div>
                </div>
            `;
        });
        document.getElementById("dispatch-units-board").innerHTML = boardHtml;
    });

    // 監聽 2：進行中案件 (更新調度員畫面 & 警察的個人任務畫面)
    const incQuery = query(collection(db, "incidents"), orderBy("timestamp", "desc"));
    onSnapshot(incQuery, (snapshot) => {
        let dispatchHtml = "";
        let myMdtHtml = "";

        snapshot.forEach((docSnap) => {
            const data = docSnap.data();
            const id = docSnap.id;
            const assigned = data.assignedUnits || [];

            // 製作給調度員看案件卡片與指派選單
            let unitOptions = `<option value="">-- 選擇單位指派 --</option>`;
            activeUnitsList.forEach(u => {
                // 如果單位還沒被指派到這案子，就顯示在選單裡
                if (!assigned.includes(u.id)) {
                    unitOptions += `<option value="${u.id}">${u.dept} - ${u.name}</option>`;
                }
            });

            // 找出已經指派的單位名稱
            let assignedNames = assigned.map(uid => {
                let unit = activeUnitsList.find(u => u.id === uid);
                return unit ? unit.name : "未知單位";
            }).join(", ");

            dispatchHtml += `
                <div class="card active-inc">
                    <strong>${data.title}</strong> <span style="float:right; color:#ff4d4d;">${data.status}</span><br>
                    <span style="color:#aaa;">📍 ${data.location}</span><br>
                    <span style="color:#ddd; font-size:0.9em;">${data.desc}</span><br>
                    <hr style="border-color:#444;">
                    <div style="font-size:0.85em; color:#4da6ff; margin-bottom:5px;">
                        已指派：${assignedNames || "無"}
                    </div>
                    <div style="display:flex; gap:5px;">
                        <select id="sel-${id}" style="padding:4px; margin:0;">${unitOptions}</select>
                        <button onclick="assignUnitToIncident('${id}', 'sel-${id}')" style="padding:4px; margin:0;">指派</button>
                    </div>
                </div>
            `;

            // 如果我是警察，且這個案件指派名單裡有我，就顯示在我的 MDT 上
            if (myUnitId && assigned.includes(myUnitId)) {
                myMdtHtml += `
                    <div class="card active-inc" style="border-left-color:#ffaa00;">
                        <strong>🚨 ${data.title}</strong><br>
                        <span style="color:#aaa;">📍 ${data.location}</span><br>
                        <span style="color:#ddd;">${data.desc}</span><br>
                        <div style="margin-top:10px; color:#4da6ff; font-size:0.9em;">
                            隊友：${assignedNames}
                        </div>
                    </div>
                `;
            }
        });

        document.getElementById("dispatch-incidents-board").innerHTML = dispatchHtml || "<span style='color:#888;'>目前無案件</span>";
        if(myUnitId) {
            document.getElementById("my-assigned-incidents").innerHTML = myMdtHtml || "<span style='color:#888;'>目前無指派任務...</span>";
        }
    });

</script>
</body>
</html>
